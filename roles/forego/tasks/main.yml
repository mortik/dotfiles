---
- name: download forego
  homebrew:
    name: forego
    state: latest
  when: ansible_facts['os_family'] == 'Darwin'

- unarchive:
    src: https://bin.equinox.io/c/ekMN3bCZFUn/forego-stable-darwin-amd64.zip
    dest: "{{ homebrew_path }}/bin/"
    remote_src: True
    creates: "{{ homebrew_path }}/bin/forego"
  become: yes
  become_method: sudo
  when: ansible_facts['distribution'] == 'Ubuntu' or ansible_facts['os_family'] == 'Archlinux'
