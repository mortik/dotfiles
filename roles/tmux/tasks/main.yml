---
- name: install tmux
  homebrew:
    name: tmux
    state: latest
  when: ansible_facts['os_family'] == 'Darwin'

- name: install tmux
  apt:
    name: tmux
    state: latest
    update_cache: yes
  become: yes
  become_method: sudo
  when: ansible_facts['distribution'] == 'Ubuntu'

- name: copy tmux conf
  copy:
    src: "tmux.conf"
    dest: "{{ ansible_facts['env']['HOME'] }}/.tmux.conf"
