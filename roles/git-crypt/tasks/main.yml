---
- name: install git-crypt
  homebrew:
    name: git-crypt
    state: latest
  when: ansible_facts['os_family'] == 'Darwin'

- name: install git-crypt
  apt:
    name: git
    state: latest
    update_cache: yes
  become: yes
  become_method: sudo
  when: ansible_facts['distribution'] == 'Ubuntu'
