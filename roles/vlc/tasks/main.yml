---
- name: install vlc
  homebrew_cask:
    name: vlc
    state: latest
    accept_external_apps: True
  when: ansible_facts['os_family'] == 'Darwin'

- block:

    - name: install codecs
      pacman:
        name:
          - a52dec
          - faac
          - faad2
          - flac
          - jasper
          - lame
          - libdca
          - libdv
          - libmad
          - libmpeg2
          - libtheora
          - libvorbis
          - libxv
          - wavpack
          - x264
          - xvidcore
        update_cache: yes

    - name: install vlc
      pacman:
        name: vlc
        update_cache: yes

  become: yes
  become_method: sudo
  when: ansible_facts['os_family'] == 'Archlinux'

- name: install vlc
  apt:
    name: vlc
    update_cache: yes
    state: latest
  become: yes
  become_method: sudo
  when: ansible_facts['distribution'] == 'Ubuntu'
