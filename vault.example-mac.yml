mas_email: "op://your-vault/dotfiles/mas-email"
mas_password: "op://your-vault/dotfiles/mas-password"
user: ""
hostname: ""
git_user_name: ""
git_user_email: ""
github_user: ""
github_token: "op://your-vault/dotfiles/github-token"
ssh_key_name: "op://your-vault/dotfiles/ssh-key-name"
ssh_key_pass: "op://your-vault/dotfiles/ssh-key-pass"
bash_cdpath: ".:$HOME:$HOME/dev:$HOME/dev/work"
zsh_cdpath: ". $HOME $HOME/dev $HOME/work"
homebrew_path: /opt/homebrew
shell: zsh
gpg_default_key_id: "op://your-vault/dotfiles/gpg-default-key-id"
editor: "code"
personal_mac: true
wallpaper: construction
git_include_configs:
  - { gitdir: "~/dev/work/", path: "~/dev/work/.gitconfig" }
mas_apps:
  - { id: 497799835, name: "Xcode" }
  - { id: 409203825, name: "Numbers" }
  - { id: 409201541, name: "Pages" }
  - { id: 409183694, name: "Keynote" }
vhosts:
  - {
      domain: "rails-app.dev",
      path: "{{ansible_facts['env']['HOME'] }}/dev/rails",
      port: 3000,
      type: rails,
    }
  - {
      domain: "phoenix-app.dev",
      path: "{{ansible_facts['env']['HOME'] }}/dev/phoenix",
      port: 4000,
      type: phoenix,
    }
  - {
      domain: "static.dev",
      path: "{{ansible_facts['env']['HOME'] }}/dev/static",
      type: static,
    }
vscode_projects:
  - { name: ".dotfiles", path: "$home/.dotfiles" }
vscode_circleci_api_key: "op://your-vault/dotfiles/vscode-circleci-api-key"
brew_apps:
  - actionlint
  - age
  - awscli
  - crowdin
  - dotnet
  - elixir
  - ffmpeg
  - flyctl
  - gh
  - ghostscript
  - git-lfs
  - gnu-sed
  - go
  - hcloud
  - hivemind
  - hub
  - lazygit
  - mas
  - mise
  - s3cmd
  - terminal-notifier
  - vips
  - yt-dlp
brew_start_services: False
cask_apps:
  - 1password
  - 1password-cli
  - alfred
  - ccmenu
  - claude-code
  - colorsnapper
  - flux
  - font-hack-nerd-font
  - imageoptim
  - ngrok
  - orbstack
  - postman
  - sketch
  - slack
  - tableplus
  - ccmenu
  - warp
  - superset

